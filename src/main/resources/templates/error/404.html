<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title>Página não encontrada</title>
</head>

<div layout:fragment="content">
	<div class="page-body">
		<div class="container-xl d-flex align-items-center justify-content-center" style="min-height:60vh">
			<div class="text-center">
				<div class="mb-3">
					<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-map-search"
						width="80" height="80" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
						style="color:var(--tblr-muted)">
						<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
						<path d="M11 18l-2 -1l-6 3v-13l6 -3l6 3l6 -3v7.5"/>
						<path d="M9 4v13"/>
						<path d="M15 7v5"/>
						<circle cx="18" cy="18" r="3"/>
						<path d="M20.2 20.2l1.8 1.8"/>
					</svg>
				</div>
				<h1 class="display-4 fw-bold text-muted">404</h1>
				<p class="fs-4 fw-semibold mb-2">Página não encontrada</p>
				<p class="text-muted mb-4">O endereço acessado não existe ou foi removido.</p>
				<a th:href="@{/}" class="btn btn-primary">
					<svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24"
						viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round">
						<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
						<path d="M5 12l14 0"/>
						<path d="M5 12l6 6"/>
						<path d="M5 12l6 -6"/>
					</svg>
					Voltar ao início
				</a>
			</div>
		</div>
	</div>
</div>

</html>

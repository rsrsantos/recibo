<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title layout:fragment="title">Novo Recibo</title>
</head>

<body>
	<div layout:fragment="content">

		<th:block th:replace="~{fragments/ui :: pageHeader('Movimento', 'Escolha o modelo')}"></th:block>

		<p class="text-secondary mb-3">
			Selecione o tipo de documento que deseja emitir.
		</p>

		<div class="row row-cards">
			<div class="col-md-6 col-lg-4" th:each="m : ${modelos}">
				<div class="card h-100"
					th:classappend="${!m.implementado or !liberados.get(m)} ? 'card-disabled' : ''">

					<div class="card-body d-flex flex-column">
						<div class="d-flex align-items-center mb-2">
							<span class="bg-primary-lt rounded p-2 me-2 d-flex">
								<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
									viewBox="0 0 24 24" fill="none" stroke="currentColor"
									stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
									<polyline points="14 2 14 8 20 8"/>
									<line x1="16" y1="13" x2="8" y2="13"/>
									<line x1="16" y1="17" x2="8" y2="17"/>
								</svg>
							</span>
							<h3 class="card-title mb-0" th:text="${m.descricao}">Modelo</h3>
							<span th:unless="${m.implementado}"
								class="badge bg-secondary-lt ms-auto">EM BREVE</span>
						</div>

						<p class="text-secondary flex-fill" th:text="${m.detalhe}">Descrição</p>

						<!-- Implementado e liberado pelo plano -->
						<a th:if="${m.implementado and liberados.get(m)}"
							th:href="@{|/recibos/novo/${m.name()}|}"
							class="btn btn-primary w-100">
							Usar este modelo
						</a>
						<!-- Implementado, mas o plano não libera -->
						<a th:if="${m.implementado and !liberados.get(m)}"
							th:href="|@{/perfil}#planos|"
							class="btn btn-outline-secondary w-100">
							Não incluso no seu plano
						</a>
						<!-- Ainda não implementado -->
						<button th:unless="${m.implementado}" type="button"
							class="btn btn-outline-secondary w-100" disabled>
							Em desenvolvimento
						</button>
					</div>
				</div>
			</div>
		</div>

		<div class="mt-3">
			<a th:href="@{/recibos}" class="btn btn-link">Voltar para recibos</a>
		</div>

	</div>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<body>

	<!--
	  Modal genérico de confirmação de exclusão.
	  Uso: th:replace="~{modais/confirmar-exclusao :: modal}"
	  O botão que abre deve ter:
	    data-bs-toggle="modal" data-bs-target="#modalExcluir"
	    data-url="/deletarX?id=123"  (link de exclusão)
	-->
	<div th:fragment="modal" class="modal modal-blur fade" id="modalExcluir" tabindex="-1">
		<div class="modal-dialog modal-sm modal-dialog-centered">
			<div class="modal-content">
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				<div class="modal-status bg-danger"></div>
				<div class="modal-body text-center py-4">
					<h3>Tem certeza?</h3>
					<div class="text-secondary">Esta ação não poderá ser desfeita.</div>
				</div>
				<div class="modal-footer">
					<div class="w-100">
						<div class="row">
							<div class="col">
								<a href="#" class="btn w-100" data-bs-dismiss="modal">Cancelar</a>
							</div>
							<div class="col">
								<a href="#" id="btnConfirmarExclusao" class="btn btn-danger w-100">Excluir</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>

</html>

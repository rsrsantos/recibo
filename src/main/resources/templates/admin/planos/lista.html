<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title layout:fragment="title">Planos</title>
</head>

<body>
	<div layout:fragment="content">

		<th:block th:replace="~{fragments/ui :: pageHeader('Administração', 'Planos')}"></th:block>

		<div class="card">
			<div class="card-header">
				<h3 class="card-title">Planos cadastrados</h3>
				<div class="card-actions">
					<a th:href="@{/admin/planos/novo}" class="btn btn-primary">Novo plano</a>
				</div>
			</div>
			<div class="table-responsive">
				<table class="table table-vcenter card-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Nome</th>
							<th>Preço/mês</th>
							<th>Limite recibos</th>
							<th>Carência</th>
							<th>PDF</th>
							<th>Relatório</th>
							<th>Status</th>
							<th class="w-1">Ações</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="p : ${planos}">
							<td th:text="${p.id}"></td>
							<td>
								<strong th:text="${p.nome}"></strong>
								<div class="small text-secondary" th:text="${p.descricao}"></div>
							</td>
							<td th:text="${'R$ ' + #numbers.formatDecimal(p.precoMensal, 1, 'POINT', 2, 'COMMA')}"></td>
							<td>
								<span th:if="${p.limiteRecibos != null}" th:text="${p.limiteRecibos}"></span>
								<span th:unless="${p.limiteRecibos != null}" class="text-secondary">Ilimitado</span>
							</td>
							<td th:text="${p.carenciaDias} + ' dias'"></td>
							<td>
								<span th:if="${p.funcPdf}" class="badge bg-success-lt">Sim</span>
								<span th:unless="${p.funcPdf}" class="badge bg-secondary-lt">Não</span>
							</td>
							<td>
								<span th:if="${p.funcRelatorio}" class="badge bg-success-lt">Sim</span>
								<span th:unless="${p.funcRelatorio}" class="badge bg-secondary-lt">Não</span>
							</td>
							<td>
								<span th:if="${p.ativo}" class="badge bg-green-lt">Ativo</span>
								<span th:unless="${p.ativo}" class="badge bg-red-lt">Inativo</span>
							</td>
							<td>
								<div class="d-flex gap-2">
									<a th:href="@{|/admin/planos/${p.id}/editar|}"
										class="btn btn-icon btn-sm btn-primary" title="Editar">
										<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
											viewBox="0 0 24 24" fill="none" stroke="currentColor"
											stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
											<path d="M4 20h4l10.5 -10.5a1.5 1.5 0 0 0 -4 -4l-10.5 10.5v4" />
											<path d="M13.5 6.5l4 4" />
										</svg>
									</a>
									<a th:href="@{|/admin/planos/${p.id}/excluir|}"
										class="btn btn-icon btn-sm btn-danger" title="Excluir"
										onclick="return confirm('Excluir este plano?')">
										<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
											viewBox="0 0 24 24" fill="none" stroke="currentColor"
											stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
											<path d="M4 7h16" />
											<path d="M10 11v6M14 11v6" />
											<path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" />
											<path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
										</svg>
									</a>
								</div>
							</td>
						</tr>
						<tr th:if="${planos.empty}">
							<td colspan="9" class="text-secondary">Nenhum plano cadastrado.</td>
						</tr>
					</tbody>
				</table>
			</div>
			<th:block th:replace="~{fragments/ui :: pagination(${planos}, '/admin/planos')}"></th:block>
		</div>
	</div>
</body>

</html>

# ====================================================================
# Perfil DEV — desenvolvimento local.
# ====================================================================

spring.jpa.show-sql=true

# Flyway desligado no boot: migrations rodadas manualmente
# (./mvnw initialize flyway:migrate).
spring.flyway.enabled=false

# Ver mudanças de template/CSS sem rebuild — serve direto de src/.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/

# ====================================================================
# Perfil HOMOLOG — homologação (testes em servidor).
# ====================================================================

spring.jpa.show-sql=true

# Flyway aplica as migrations automaticamente no boot do container.
spring.flyway.enabled=true

# Cache de templates ligado (serve do classpath empacotado).
spring.thymeleaf.cache=true

# Logs um pouco mais verbosos para depurar a homologação.
logging.level.com.br.rr=DEBUG

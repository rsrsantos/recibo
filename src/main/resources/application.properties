spring.datasource.url=jdbc:postgresql://localhost:5432/recibo
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Context-path da aplicação (evita conflito ao subir no servidor).
server.servlet.context-path=/recibo

# Migrations rodadas MANUALMENTE via Maven (./mvnw initialize flyway:migrate).
# Flyway desligado no boot; Hibernate apenas valida o schema, não altera.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# --- Google OAuth2 ---
# Cadastre em: https://console.cloud.google.com → APIs e serviços → Credenciais
# URI de redirecionamento autorizado: http://localhost:8080/recibo/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=TESTE
spring.security.oauth2.client.registration.google.client-secret=TESTE
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# --- Mercado Pago ---
# Crie sua aplicação em: https://www.mercadopago.com.br/developers/panel
# Credenciais de TESTE têm prefixo TEST-; produção não tem.
mercadopago.access-token=TESTE
mercadopago.public-key=TESTE

# --- DEV: ver mudanças de template/CSS sem rebuild (reverter antes de empacotar) ---
# Serve templates e estáticos direto de src/, não do target/classes.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/

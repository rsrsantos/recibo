spring.datasource.url=jdbc:postgresql://localhost:5432/recibo
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Migrations rodadas MANUALMENTE via Maven (./mvnw initialize flyway:migrate).
# Flyway desligado no boot; Hibernate apenas valida o schema, não altera.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# --- DEV: ver mudanças de template/CSS sem rebuild (reverter antes de empacotar) ---
# Serve templates e estáticos direto de src/, não do target/classes.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/

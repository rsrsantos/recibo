<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

	<header th:fragment="navbar" class="navbar navbar-expand-md navbar-dark sticky-top app-navbar">
		<div class="container-xl">

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
				data-bs-target="#topo-menu">
				<span class="navbar-toggler-icon"></span>
			</button>

			<h1 class="navbar-brand pe-3 mb-0">
				<a th:href="@{/}" class="d-flex align-items-center gap-2 text-white text-decoration-none">
					<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"
						viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M5 21V5a2 2 0 0 1 2-2h7l5 5v13l-2-1.5L15 21l-2-1.5L11 21l-2-1.5L7 21z" />
						<path d="M9 7h6M9 11h6M9 15h4" />
					</svg>
					<span class="fw-semibold">Recibos</span>
				</a>
			</h1>

			<div class="collapse navbar-collapse" id="topo-menu">
				<ul class="navbar-nav">
					<li class="nav-item" th:classappend="${currentUri == '/'} ? ' active'">
						<a class="nav-link" th:href="@{/}">Início</a>
					</li>
					<li class="nav-item"
						th:classappend="${currentUri != null and #strings.startsWith(currentUri, '/pessoas')} ? ' active'">
						<a class="nav-link" th:href="@{/pessoas}">Clientes</a>
					</li>
					<li class="nav-item"
						th:classappend="${currentUri != null and #strings.startsWith(currentUri, '/recibos')} ? ' active'">
						<a class="nav-link" th:href="@{/recibos}">Recibos</a>
					</li>
					<li class="nav-item dropdown"
						th:classappend="${currentUri != null and #strings.startsWith(currentUri, '/emitente')} ? ' active'">
						<a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Configurações</a>
						<div class="dropdown-menu">
							<a class="dropdown-item" th:href="@{/emitente}">Dados do Emitente</a>
						</div>
					</li>
					<li class="nav-item dropdown" sec:authorize="hasRole('ADMINISTRADOR')"
						th:classappend="${currentUri != null and #strings.startsWith(currentUri, '/admin')} ? ' active'">
						<a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Admin</a>
						<div class="dropdown-menu">
							<a class="dropdown-item" th:href="@{/admin}">Painel de assinaturas</a>
							<a class="dropdown-item" th:href="@{/admin/planos}">Planos</a>
							<a class="dropdown-item" th:href="@{/admin/usuarios}">Usuários</a>
							<a class="dropdown-item" th:href="@{/admin/perfis}">Perfis</a>
						</div>
					</li>
				</ul>

				<div class="navbar-nav flex-row order-md-last ms-md-auto">
					<div class="nav-item dropdown">
						<a href="#" class="nav-link d-flex lh-1 p-0 px-2" data-bs-toggle="dropdown"
							aria-label="Menu do usuário">
							<span class="avatar avatar-sm bg-white text-primary fw-bold"
								th:text="${nomeUsuario != null ? #strings.toUpperCase(#strings.substring(nomeUsuario,0,1)) : 'U'}">A</span>
							<div class="d-none d-md-block ps-2 text-white">
								<div class="fw-semibold" th:text="${nomeUsuario ?: 'Usuário'}">usuário</div>
								<div class="small opacity-75">Conta</div>
							</div>
						</a>
						<div class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
							<a class="dropdown-item" th:href="@{/perfil}">Meu perfil</a>
							<a class="dropdown-item" th:href="@{/alterar-senha}">Alterar senha</a>
							<div class="dropdown-divider"></div>
							<form th:action="@{/logout}" method="post" class="m-0">
								<button type="submit" class="dropdown-item text-danger">Sair</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</header>

</body>

</html>

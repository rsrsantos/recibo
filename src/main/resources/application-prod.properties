# ====================================================================
# Perfil PROD — produção.
# ====================================================================

spring.jpa.show-sql=false

# Flyway aplica as migrations automaticamente no boot do container.
spring.flyway.enabled=true

# Cache de templates ligado (serve do classpath empacotado).
spring.thymeleaf.cache=true

logging.level.root=WARN
logging.level.com.br.rr=INFO

# Não expõe detalhes de erro ao cliente.
server.error.include-message=never
server.error.include-stacktrace=never

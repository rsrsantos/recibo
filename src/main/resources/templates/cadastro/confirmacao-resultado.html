<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Confirmação de e-mail — Recibos</title>
	<link rel="stylesheet" th:href="@{/vendor/tabler/css/tabler.min.css}">
	<style>
		body { background: #f4f6fb; }

		.result-page {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 2rem 1rem;
		}

		.result-card {
			background: #fff;
			border-radius: 16px;
			box-shadow: 0 4px 24px rgba(0,0,0,.08);
			width: 100%;
			max-width: 440px;
			overflow: hidden;
			text-align: center;
		}

		.result-header-success {
			background: linear-gradient(135deg, #2fb344 0%, #1d8a33 100%);
			padding: 2.5rem 2rem;
		}
		.result-header-error {
			background: linear-gradient(135deg, #d63939 0%, #b52a2a 100%);
			padding: 2.5rem 2rem;
		}

		.result-icon-wrap {
			width: 72px; height: 72px;
			background: rgba(255,255,255,.18);
			border-radius: 50%;
			display: flex; align-items: center; justify-content: center;
			margin: 0 auto;
			border: 2px solid rgba(255,255,255,.3);
		}

		.result-body { padding: 2rem 2rem 2.5rem; }

		.result-body h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: .5rem; }

		.btn-main {
			display: inline-flex;
			align-items: center;
			gap: .5rem;
			padding: .75rem 2rem;
			border-radius: 10px;
			font-weight: 600;
			font-size: .9rem;
			text-decoration: none;
			transition: opacity .15s;
			margin-top: 1.5rem;
		}
		.btn-main:hover { opacity: .88; }
		.btn-success-main { background: #2fb344; color: #fff; }
		.btn-outline-main { background: transparent; color: #d63939; border: 2px solid #d63939; }

		.brand-label {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: .4rem;
			color: rgba(255,255,255,.8);
			font-size: .8rem;
			font-weight: 500;
			margin-bottom: 1.75rem;
		}
	</style>
</head>
<body>
<div class="result-page">
	<div class="result-card">

		<!-- SUCESSO -->
		<div th:if="${sucesso}">
			<div class="result-header-success">
				<div class="brand-label">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2">
						<path d="M5 21V5a2 2 0 0 1 2-2h7l5 5v13l-2-1.5L15 21l-2-1.5L11 21l-2-1.5L7 21z"/>
						<path d="M9 7h6M9 11h6M9 15h4"/>
					</svg>
					Recibos
				</div>
				<div class="result-icon-wrap">
					<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
						fill="none" stroke="#fff" stroke-width="2">
						<circle cx="12" cy="12" r="10"/>
						<path d="m9 12 2 2 4-4"/>
					</svg>
				</div>
			</div>
			<div class="result-body">
				<h2>E-mail confirmado!</h2>
				<p class="text-muted" style="font-size:.9rem">
					Sua conta está ativa. Você já pode acessar a plataforma e começar a emitir recibos.
				</p>
				<a th:href="@{/login?confirmado}" class="btn-main btn-success-main">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2.5">
						<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
					</svg>
					Entrar na minha conta
				</a>
			</div>
		</div>

		<!-- ERRO -->
		<div th:if="${erro}">
			<div class="result-header-error">
				<div class="brand-label">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2">
						<path d="M5 21V5a2 2 0 0 1 2-2h7l5 5v13l-2-1.5L15 21l-2-1.5L11 21l-2-1.5L7 21z"/>
						<path d="M9 7h6M9 11h6M9 15h4"/>
					</svg>
					Recibos
				</div>
				<div class="result-icon-wrap">
					<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
						fill="none" stroke="#fff" stroke-width="2">
						<circle cx="12" cy="12" r="10"/>
						<path d="m15 9-6 6M9 9l6 6"/>
					</svg>
				</div>
			</div>
			<div class="result-body">
				<h2>Link inválido ou expirado</h2>
				<p class="text-muted" style="font-size:.9rem" th:text="${erro}">Mensagem de erro.</p>
				<a th:href="@{/cadastro/aguardando-confirmacao}" class="btn-main btn-outline-main">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2.5">
						<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
						<path d="M3 3v5h5"/>
					</svg>
					Solicitar novo e-mail
				</a>
			</div>
		</div>

	</div>
</div>
<th:block th:replace="~{fragments/whatsapp :: btn(${whatsapp})}"></th:block>
<script th:src="@{/vendor/tabler/js/tabler.min.js}"></script>
</body>
</html>

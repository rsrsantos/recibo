<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title layout:fragment="title">Novo Recibo</title>
</head>

<body>
	<div layout:fragment="content">

		<th:block th:replace="~{fragments/ui :: pageHeader('Movimento', 'Novo Recibo')}"></th:block>

		<form method="post" th:action="@{/cadastrarRecibo}" th:object="${reciboForm}">
			<div class="card">
				<div class="card-header">
					<h3 class="card-title">Dados do Recibo</h3>
				</div>
				<div class="card-body">
					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label required">Cliente</label>
							<select class="form-select" th:field="*{clienteId}" required>
								<option value="">Selecione o cliente...</option>
								<option th:each="c : ${clientes}" th:value="${c.id}"
									th:text="${c.nome}"></option>
							</select>
						</div>
						<div class="col-md-6 mb-3">
							<label class="form-label">Observação</label>
							<input type="text" class="form-control" th:field="*{observacao}"
								placeholder="Opcional">
						</div>
					</div>
				</div>
			</div>

			<div class="card mt-3">
				<div class="card-header">
					<h3 class="card-title">Itens</h3>
					<div class="card-actions">
						<button type="button" class="btn btn-sm btn-outline-primary"
							onclick="adicionarLinhaRecibo()">+ Adicionar produto</button>
					</div>
				</div>
				<div class="card-body">
					<table class="table table-vcenter" id="tabelaItens">
						<thead>
							<tr>
								<th>Produto</th>
								<th class="w-25">Quantidade</th>
								<th class="w-1"></th>
							</tr>
						</thead>
						<tbody>
							<tr class="item-row">
								<td>
									<select class="form-select" name="itens[0].produtoId" required>
										<option value="">Selecione o produto...</option>
										<option th:each="p : ${produtos}" th:value="${p.id}"
											th:text="${p.nome + ' - R$ ' + #numbers.formatDecimal(p.valor, 1, 2)}"></option>
									</select>
								</td>
								<td>
									<input type="number" min="1" value="1" class="form-control"
										name="itens[0].quantidade" required>
								</td>
								<td>
									<button type="button" class="btn btn-sm btn-outline-danger"
										onclick="removerLinhaRecibo(this)">x</button>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>

			<div class="text-end mt-3">
				<a th:href="@{/recibos}" class="btn btn-link">Cancelar</a>
				<button type="submit" class="btn btn-primary">Emitir Recibo</button>
			</div>
		</form>

	</div>

	<th:block layout:fragment="scripts">
		<script th:src="@{/js/recibo.js}"></script>
	</th:block>
</body>

</html>

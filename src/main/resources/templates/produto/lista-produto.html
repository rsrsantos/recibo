<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title layout:fragment="title">Produtos</title>
</head>

<body>
	<div layout:fragment="content">

		<th:block th:replace="~{fragments/ui :: pageHeader('Cadastros', 'Produtos')}"></th:block>

		<div class="card">
			<div class="card-header">
				<h3 class="card-title">Lista de produtos</h3>
				<div class="card-actions">
					<a th:href="@{/cadastrarProduto}" class="btn btn-primary">Novo produto</a>
				</div>
			</div>
			<div class="table-responsive">
				<table class="table table-vcenter card-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Nome</th>
							<th>Valor</th>
							<th class="w-1">Ações</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="produto : ${produtos}">
							<td th:text="${produto.id}"></td>
							<td th:text="${produto.nome}"></td>
							<td th:text="${'R$ ' + #numbers.formatDecimal(produto.valor != null ? produto.valor : 0, 1, 2)}"></td>
							<td>
								<a th:href="@{/editar-produto(id=${produto.id})}"
									class="btn btn-sm btn-outline-primary">Editar</a>
								<a href="#" class="btn btn-sm btn-outline-danger"
									data-bs-toggle="modal" data-bs-target="#modalExcluir"
									th:attr="data-url=@{/deletarProduto(id=${produto.id})}">Excluir</a>
							</td>
						</tr>
						<tr th:if="${produtos.empty}">
							<td colspan="4" class="text-secondary">Nenhum produto cadastrado.</td>
						</tr>
					</tbody>
				</table>
			</div>
			<th:block th:replace="~{fragments/ui :: pagination(${produtos}, '/produtos')}"></th:block>
		</div>

		<th:block th:replace="~{modais/confirmar-exclusao :: modal}"></th:block>
	</div>
</body>

</html>

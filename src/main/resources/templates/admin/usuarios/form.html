<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title layout:fragment="title">Editar Usuário</title>
</head>

<body>
	<div layout:fragment="content">

		<th:block th:replace="~{fragments/ui :: pageHeader('Administração', 'Editar Usuário')}"></th:block>

		<div class="card">
			<div class="card-body">
				<form method="post"
					th:action="@{|/admin/usuarios/${usuarioEditForm.id}|}"
					th:object="${usuarioEditForm}">

					<div class="mb-3">
						<label class="form-label required">Nome</label>
						<input type="text" class="form-control" th:field="*{nome}" required>
						<div class="text-danger small" th:if="${#fields.hasErrors('nome')}"
							th:errors="*{nome}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label required">E-mail</label>
						<input type="email" class="form-control" th:field="*{email}" required>
						<div class="text-danger small" th:if="${#fields.hasErrors('email')}"
							th:errors="*{email}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">Nova senha</label>
						<input type="password" class="form-control" th:field="*{novaSenha}"
							placeholder="Deixe em branco para não alterar" autocomplete="new-password">
						<small class="text-secondary">Preencha apenas se quiser redefinir a senha (mín. 6 caracteres).</small>
					</div>

					<div class="text-end">
						<a th:href="@{/admin/usuarios}" class="btn btn-link">Cancelar</a>
						<button type="submit" class="btn btn-primary">Salvar</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>

</html>

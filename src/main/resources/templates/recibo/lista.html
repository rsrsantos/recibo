<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title layout:fragment="title">Recibos</title>
</head>

<body>
	<div layout:fragment="content">

		<th:block th:replace="~{fragments/ui :: pageHeader('Movimento', 'Recibos')}"></th:block>

		<div class="card">
			<div class="card-header">
				<h3 class="card-title">Recibos emitidos</h3>
				<div class="card-actions">
					<a th:href="@{/recibos/novo}" class="btn btn-primary">Novo recibo</a>
				</div>
			</div>
			<div class="table-responsive">
				<table class="table table-vcenter card-table">
					<thead>
						<tr>
							<th>Nº</th>
							<th>Data</th>
							<th>Destinatário</th>
							<th class="text-end">Valor Total</th>
							<th class="w-1">Ações</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="r : ${recibos}">
							<td th:text="${r.nRecibo}"></td>
							<td th:text="${r.dataGeracao}"></td>
							<td th:text="${r.destinatario != null ? r.destinatario.nome : ''}"></td>
							<td class="text-end"
								th:text="${'R$ ' + #numbers.formatDecimal(r.vlrTotal != null ? r.vlrTotal : 0, 1, 2)}"></td>
							<td>
								<div class="d-flex gap-2">
									<a th:href="@{|/recibos/${r.id}/excluir|}"
										class="btn btn-icon btn-sm btn-danger" title="Excluir"
										onclick="return confirm('Excluir este recibo?')">
										<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
											viewBox="0 0 24 24" fill="none" stroke="currentColor"
											stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
											<path d="M4 7h16" />
											<path d="M10 11v6M14 11v6" />
											<path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" />
											<path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
										</svg>
									</a>
								</div>
							</td>
						</tr>
						<tr th:if="${recibos.empty}">
							<td colspan="5" class="text-secondary">Nenhum recibo emitido.</td>
						</tr>
					</tbody>
				</table>
			</div>
			<th:block th:replace="~{fragments/ui :: pagination(${recibos}, '/recibos')}"></th:block>
		</div>
	</div>
</body>

</html>

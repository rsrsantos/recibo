<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
	<title layout:fragment="title">Recibos</title>
</head>

<body>
	<div layout:fragment="content">

		<th:block th:replace="~{fragments/ui :: pageHeader('Movimento', 'Recibos')}"></th:block>

		<div class="card">
			<div class="card-header">
				<h3 class="card-title">Recibos emitidos</h3>
				<div class="card-actions">
					<a th:href="@{/cadastrarRecibo}" class="btn btn-primary">Novo recibo</a>
				</div>
			</div>
			<div class="table-responsive">
				<table class="table table-vcenter card-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Data</th>
							<th>Nº Recibo</th>
							<th>Cliente</th>
							<th class="text-end">Valor Total</th>
							<th class="w-1">Ações</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="recibo : ${recibos}">
							<td th:text="${recibo.id}"></td>
							<td th:text="${recibo.dataInclusao != null ? #dates.format(recibo.dataInclusao, 'dd-MM-yyyy') : ''}"></td>
							<td th:text="${recibo.numeroRecibo}"></td>
							<td th:text="${recibo.cliente != null ? recibo.cliente.nome : ''}"></td>
							<td class="text-end"
								th:text="${'R$ ' + #numbers.formatDecimal(recibo.valorTotal != null ? recibo.valorTotal : 0, 1, 2)}"></td>
							<td>
								<a href="#" class="btn btn-sm btn-outline-danger"
									data-bs-toggle="modal" data-bs-target="#modalExcluir"
									th:attr="data-url=@{/deletarRecibo(id=${recibo.id})}">Excluir</a>
							</td>
						</tr>
						<tr th:if="${recibos.empty}">
							<td colspan="6" class="text-secondary">Nenhum recibo emitido.</td>
						</tr>
					</tbody>
				</table>
			</div>
			<th:block th:replace="~{fragments/ui :: pagination(${recibos}, '/recibos')}"></th:block>
		</div>

		<th:block th:replace="~{modais/confirmar-exclusao :: modal}"></th:block>
	</div>
</body>

</html>

# ====================================================================
# Configuração COMUM a todos os ambientes.
# Valores sensíveis vêm de variáveis de ambiente (ver .env.example).
# O que muda por ambiente fica em application-{perfil}.properties.
# ====================================================================

spring.application.name=recibo

# Perfil ativo: dev | homolog | prod  (default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Context-path da aplicação.
server.servlet.context-path=/recibo

# --- Banco de dados (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/recibo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate apenas valida o schema; quem altera é o Flyway.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration

# --- URL base da aplicação (usada nos links de e-mail) ---
app.url-base=${APP_URL_BASE:http://localhost:8080/recibo}

# --- WhatsApp de suporte (só dígitos: país+DDD+número) ---
app.whatsapp=${APP_WHATSAPP:}

# --- E-mail (SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.remetente=${MAIL_REMETENTE:}

# --- Google OAuth2 (opcional — deixe em branco para desabilitar o botão "Entrar com Google") ---
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# --- Mercado Pago ---
mercadopago.access-token=${MP_ACCESS_TOKEN:}
mercadopago.public-key=${MP_PUBLIC_KEY:}
